name: Comment Publication Validation Result

on:
  workflow_run:
    workflows: ["Validate Publication Entry"]
    types: [completed]

jobs:
  comment:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      actions: read

    steps:
      - name: Download validation summary
        uses: actions/download-artifact@v4
        with:
          name: validation-summary
          path: /tmp/validation-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const prNumber = parseInt(
              fs.readFileSync('/tmp/validation-artifact/pr-number.txt', 'utf8').trim(),
              10,
            );
            if (!prNumber) {
              core.setFailed('Missing PR number in artifact');
              return;
            }

            let body = '';
            try {
              body = fs.readFileSync('/tmp/validation-artifact/summary.md', 'utf8');
            } catch {
              body = '## Validation\nCould not generate validation summary. Check the workflow logs.';
            }

            const conclusion = context.payload.workflow_run.conclusion;
            const header = conclusion === 'success'
              ? ''
              : `> Validation workflow concluded with: **${conclusion}**\n\n`;

            const marker = '<!-- validate-entry-bot -->';
            body = marker + '\n' + header + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
            }
