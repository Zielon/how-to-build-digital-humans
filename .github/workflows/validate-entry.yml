name: Validate Publication Entry

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'assets/data/publications.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base publications.json
        run: git show origin/${{ github.base_ref }}:assets/data/publications.json > /tmp/base-publications.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run validation
        id: validate
        run: |
          python scripts/validate_new_entries.py \
            --base /tmp/base-publications.json \
            --pr assets/data/publications.json \
            --github-output /tmp/validation-summary.md \
          && echo "status=success" >> "$GITHUB_OUTPUT" \
          || echo "status=failure" >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '';
            try {
              body = fs.readFileSync('/tmp/validation-summary.md', 'utf8');
            } catch {
              body = '## Validation\nCould not generate validation summary. Check the workflow logs.';
            }

            // Find and update existing comment, or create new one
            const marker = '<!-- validate-entry-bot -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Fail if validation failed
        if: steps.validate.outputs.status == 'failure'
        run: exit 1
