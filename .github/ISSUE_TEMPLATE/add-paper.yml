name: Add a paper
description: Suggest a paper to add to the survey website
title: "[Paper] "
labels: ["new-paper"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a paper! Fill in the details below and a maintainer
        will add it to the website. Fields marked with * are required.

  # ------------------------------------------------------------------
  # Paper metadata
  # ------------------------------------------------------------------
  - type: input
    id: title
    attributes:
      label: Paper title
      placeholder: "e.g. Towards Metrical Reconstruction of Human Faces"
    validations:
      required: true

  - type: input
    id: authors
    attributes:
      label: Authors
      description: Comma-separated list of authors.
      placeholder: "e.g. Wojciech Zielonka, Timo Bolkart, Justus Thies"
    validations:
      required: true

  - type: input
    id: year
    attributes:
      label: Year
      placeholder: "e.g. 2024"
    validations:
      required: true

  - type: dropdown
    id: venue
    attributes:
      label: Venue
      description: Select the publication venue. Choose "Other" and specify in the notes if not listed.
      options:
        - CVPR
        - ECCV
        - ICCV
        - SIGGRAPH (TOG)
        - SIGGRAPH Asia (TOG)
        - SIGGRAPH (Conference)
        - NeurIPS
        - ICLR
        - ICML
        - AAAI
        - BMVC
        - WACV
        - TOG
        - TPAMI
        - IJCV
        - CGF
        - TVCG
        - 3DV
        - FG
        - arXiv
        - Other
    validations:
      required: true

  - type: input
    id: venue_other
    attributes:
      label: Venue (if "Other")
      description: Specify the venue if you selected "Other" above.
      placeholder: "e.g. MICCAI, RSS, ..."

  # ------------------------------------------------------------------
  # Links
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: "### Links"

  - type: input
    id: arxiv_url
    attributes:
      label: arXiv PDF link
      description: Direct link to the PDF on arXiv.
      placeholder: "https://arxiv.org/pdf/2204.06607"
    validations:
      required: true

  - type: input
    id: project_url
    attributes:
      label: Project page URL
      placeholder: "https://zielon.github.io/mica/"

  - type: input
    id: code_url
    attributes:
      label: Code repository URL
      placeholder: "https://github.com/Zielon/MICA"

  - type: input
    id: video_url
    attributes:
      label: Video URL
      placeholder: "https://youtu.be/..."

  # ------------------------------------------------------------------
  # Classification
  # ------------------------------------------------------------------
  - type: markdown
    attributes:
      value: |
        ### Classification (optional)
        If you know how this paper should be classified, fill in the fields below.
        Otherwise a maintainer will classify it.

  - type: dropdown
    id: table_type
    attributes:
      label: Category
      description: Does this paper create avatars or digital assets?
      options:
        - Avatar
        - Assets
        - Not sure
    validations:
      required: false

  - type: dropdown
    id: contents
    attributes:
      label: Contents
      description: What body part does the paper focus on?
      options:
        - Face
        - Full-body
        - Hair
        - Hands
        - Garment
        - Teeth
        - Tongue
        - Not sure
      multiple: true
    validations:
      required: false

  - type: dropdown
    id: data_type
    attributes:
      label: Data type
      options:
        - Real
        - Synthetic
        - Real, Synthetic
    validations:
      required: false

  - type: dropdown
    id: image_synthesis
    attributes:
      label: Image synthesis / Representation
      options:
        - NeRF
        - 3DGS
        - Mesh
        - Neural Rendering
        - Not sure
      multiple: true
    validations:
      required: false

  # ------------------------------------------------------------------
  # Notes
  # ------------------------------------------------------------------
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Any extra context, e.g. why this paper is relevant, related papers already in the survey, etc.
